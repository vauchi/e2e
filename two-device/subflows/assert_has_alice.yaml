appId: app.vauchi
name: Assert Bob's Contacts contains Alice (two-device subflow)
---
# Subflow: navigate to Contacts and assert that "Alice" is visible.
# Run on `${DEVICE_B_SERIAL}`. Mirror of `assert_has_bob.yaml`.

- waitForAnimationToEnd
- tapOn: "Contacts"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: "Alice"
