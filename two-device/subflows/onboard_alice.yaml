appId: app.vauchi
name: Onboard Alice (two-device subflow)
---
# Subflow: drive a single device through fresh onboarding with the
# display name "Alice". Used by `symmetric_exchange.sh`. The
# orchestrator runs this against `${DEVICE_A_SERIAL}` while the
# parallel `onboard_bob.yaml` runs against `${DEVICE_B_SERIAL}`.

- launchApp:
    clearState: true

- assertVisible: "Create New Identity"
- tapOn: "Create New Identity"
- assertVisible: "What's your name?"
- inputText: "Alice"
- hideKeyboard
- tapOn: "Next"
- tapOn: "Skip for now"
- tapOn: "Looks good!"
- tapOn: "Finish setup"
- waitForAnimationToEnd:
    timeout: 15000
- assertVisible: "Your Card"
