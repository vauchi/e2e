# iOS Maestro Flow: Delete Decoy Contact
# Removes a decoy contact from the duress profile.
# Requires a decoy contact to exist.
# Environment variables:
#   DECOY_NAME - Name of the decoy contact to delete (required)

appId: app.vauchi.ios

---

# Navigate to Settings > Duress PIN
- tapOn: "Settings"
- tapOn: "Duress PIN"

# Verify decoy contact exists
- assertVisible: ${DECOY_NAME}

# Delete the decoy contact (tap trash icon next to name)
# The delete button is in the same row as the contact name
- tapOn:
    id: "delete_decoy_${DECOY_NAME}"

- waitForAnimationToEnd

# Verify decoy contact is gone
- assertNotVisible: ${DECOY_NAME}

# Go back
- back
