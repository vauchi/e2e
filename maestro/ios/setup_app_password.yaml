# iOS Maestro Flow: Setup App Password
# Prerequisite for duress PIN — sets a separate password asked after biometric unlock.
# Environment variables:
#   APP_PASSWORD - Password to set (required)

appId: app.vauchi.ios

---

# Navigate to Settings > Duress PIN
- tapOn: "Settings"
- tapOn: "Duress PIN"

# Verify app password is not yet set
- assertVisible: "Not set"

# Tap to set app password
- tapOn: "Set App Password"

# Enter password and confirm
- assertVisible: "Set App Password"
- tapOn:
    id: "password_field"
- inputText: ${APP_PASSWORD}
- tapOn:
    id: "confirm_password_field"
- inputText: ${APP_PASSWORD}

# Save
- tapOn: "Set"

# Wait for Argon2id hashing
- waitForAnimationToEnd:
    timeout: 15000

# Verify password is now enabled
- assertVisible: "Enabled"

# Go back to Settings
- back
