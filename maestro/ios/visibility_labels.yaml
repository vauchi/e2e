# iOS Maestro Flow: Visibility Labels
# Creates a label and assigns a contact to it

appId: com.vauchi.app

---

# Navigate to Labels
- tapOn: "Settings"
- tapOn: "Visibility Labels"

# Create a new label
- tapOn: "Create Label"
- inputText: "${LABEL_NAME}"
- tapOn: "Save"
- waitForAnimationToEnd

# Verify label was created
- assertVisible: "${LABEL_NAME}"

# Add a contact to the label
- tapOn: "${LABEL_NAME}"
- tapOn: "Add Contact"
- tapOn: "${CONTACT_NAME}"
- tapOn: "Done"
- waitForAnimationToEnd

# Verify contact was added
- assertVisible: "${CONTACT_NAME}"

# Go back
- back
