appId: app.vauchi.mobile
name: Create Identity
---
# Create a new identity with the given name
# Environment variables:
#   NAME - Display name for the identity (required)
#   VAUCHI_RELAY_URL - Relay server URL (optional, uses default if not set)

- launchApp:
    clearState: true

# Wait for app to load
- waitForAnimationToEnd

# Check if we're on the welcome/onboarding screen
- assertVisible: "Get Started"

# Tap to begin identity creation
- tapOn: "Get Started"

# Enter display name
- assertVisible: "What's your name?"
- inputText: ${NAME}

# Continue to next step
- tapOn: "Continue"

# Skip onboarding steps (Add Fields, Preview, Security)
# These are optional steps we can fast-track
- tapOn: "Skip for now"
- assertVisible: "Your card"
- tapOn: "Looks good!"
- assertVisible: "Your info is private"
- tapOn: "Finish setup"

# Wait for identity generation (crypto operations)
- waitForAnimationToEnd:
    timeout: 10000

# Verify onboarding completed successfully
- assertVisible: "You're all set!"

# Wait for transition to main app
- waitForAnimationToEnd:
    timeout: 5000

# Optional: Set custom relay if provided
- runFlow:
    when:
      visible: "Settings"
    commands:
      - tapOn: "Settings"
      - tapOn: "Relay Server"
      - clearText
      - inputText: ${VAUCHI_RELAY_URL}
      - tapOn: "Save"
      - back

# Return to main screen
- assertVisible: "Your Card"
