appId: app.vauchi.ios
name: Sync with Relay
---
# Trigger a sync with the relay server
# This pulls any pending updates from contacts

- launchApp

# Wait for app to be ready
- waitForAnimationToEnd

# Pull to refresh on the main contacts list
- assertVisible: "Contacts"
- swipe:
    direction: DOWN
    duration: 500

# Wait for sync to complete
- waitForAnimationToEnd:
    timeout: 10000

# Verify sync indicator disappears (or shows success)
- extendedWaitUntil:
    notVisible: "Syncing..."
    timeout: 15000

# Post-state assertions — Layer 3 gate (plan Task 3.2). After
# sync completes, the Contacts list view must still be the
# active screen (no error page, no unexpected modal). This is
# a weaker signal than a content-based assertion (which would
# require seeding a contact before the run), but catches the
# common "spinner hid because of error" failure mode.
- assertVisible: "Contacts"
- assertNotVisible: "Connection failed"
- assertNotVisible: "Error"

# Alternative: Check for sync status in settings
- runFlow:
    when:
      visible: "Settings"
    commands:
      - tapOn: "Settings"
      - assertVisible: "Last synced"
      - back
