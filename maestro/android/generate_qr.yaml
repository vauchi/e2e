appId: app.vauchi
name: Generate QR Code (Android)
---
# Generate a QR code for contact exchange
# Output: QR data is written to /tmp/vauchi_qr_data.txt
#
# The flow navigates to the exchange screen and captures QR data
# either via screenshot or by reading the displayed code.

- launchApp

# Wait for app to be ready
- waitForAnimationToEnd

# Navigate to exchange screen from home
- tapOn: "Exchange"

# Wait for QR generation
- waitForAnimationToEnd:
    timeout: 10000

# Verify QR code section is displayed
- assertVisible: "Your QR Code"

# Take screenshot for QR extraction
- takeScreenshot: /tmp/vauchi_qr_screenshot.png

# Post-state assertion — Layer 3 gate (plan Task 3.2). The
# exchange screen must still be active after the QR is rendered;
# a regression that auto-dismisses the screen or routes elsewhere
# after display-start would have still captured a QR screenshot
# from the brief moment before dismissal. This catches that class
# of bug. Phase 4's two-device harness owns the symmetric-exchange
# invariant; this single-device flow only checks the hand-off
# point is reachable.
- assertVisible: "Your QR Code"
