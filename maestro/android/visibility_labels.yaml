# Android Maestro Flow: Visibility Labels
# Creates a label and assigns a contact to it

appId: app.vauchi

---

# Navigate to Labels
- tapOn: "Settings"
- tapOn: "Visibility Labels"

# Create a new label
- tapOn: "Create Label"
- inputText: "${LABEL_NAME}"
- hideKeyboard
- tapOn: "Save"
- waitForAnimationToEnd

# Verify label was created
- assertVisible: "${LABEL_NAME}"

# Add a contact to the label
- tapOn: "${LABEL_NAME}"
- tapOn: "Add Contact"
- tapOn: "${CONTACT_NAME}"
- tapOn: "Done"
- hideKeyboard
- waitForAnimationToEnd

# Verify contact was added
- assertVisible: "${CONTACT_NAME}"

# Go back
- pressKey: back
