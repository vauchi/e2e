# Android Maestro Flow: Add Decoy Contact
# Adds a fake contact shown when duress PIN is entered.
# Requires duress PIN to be enabled first.
# Environment variables:
#   DECOY_NAME - Display name for the decoy contact (required)

appId: com.vauchi

---

# Navigate to Settings
- tapOn: "Settings"

# Scroll to Decoy Contacts section
- swipe:
    direction: UP
    duration: 300

# Verify decoy section is visible
- assertVisible: "Decoy Contacts"

# Add a decoy contact
- tapOn: "Add Decoy Contact"
- assertVisible: "Add Decoy Contact"
- inputText: ${DECOY_NAME}
- hideKeyboard
- tapOn: "Add"

- waitForAnimationToEnd

# Verify decoy contact appears in list
- assertVisible: ${DECOY_NAME}

# Go back
- pressKey: back
