# Android Maestro Flow: Hide Contact
# Hides a contact from the main contact list via long-press context menu.
# Environment variables:
#   CONTACT_NAME - Name of the contact to hide (required)

appId: app.vauchi

---

# Navigate to contacts
- tapOn: "Contacts"
- waitForAnimationToEnd

# Verify contact is visible
- assertVisible: ${CONTACT_NAME}

# Long-press on the contact to show context menu
- longPressOn: ${CONTACT_NAME}

# Confirm hide in dialog
- assertVisible: "Hide ${CONTACT_NAME}?"
- tapOn: "Hide"

- waitForAnimationToEnd

# Verify contact is no longer visible in main list
- assertNotVisible: ${CONTACT_NAME}
