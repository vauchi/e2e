# Android Maestro Flow: Setup App Password
# Prerequisite for duress PIN — sets a separate password asked after biometric unlock.
# Environment variables:
#   APP_PASSWORD - Password to set (required)

appId: com.vauchi

---

# Navigate to Settings
- tapOn: "Settings"

# Scroll down to find App Password section
- swipe:
    direction: UP
    duration: 300

# Tap to set app password
- tapOn: "Set App Password"

# Enter password and confirm
- assertVisible: "App Password"
- tapOn:
    id: "password_field"
- inputText: ${APP_PASSWORD}
- hideKeyboard
- tapOn:
    id: "confirm_password_field"
- inputText: ${APP_PASSWORD}
- hideKeyboard

# Save
- tapOn: "Set"

# Wait for Argon2id hashing
- waitForAnimationToEnd:
    timeout: 15000

# Go back to Settings
- pressKey: back
