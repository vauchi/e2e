appId: app.vauchi
name: Create Identity (Android)
---
# Create a new identity with the given name
# Environment variables:
#   NAME - Display name for the identity (required)
#   VAUCHI_RELAY_URL - Relay server URL (optional, uses default if not set)
#
# Screen sequence verified against
# `core/vauchi-app/src/ui/onboarding.rs` at core v0.20.3:
#   identity_check → default_name → groups_setup → contact_info → what_next

- launchApp:
    clearState: true

- waitForAnimationToEnd

# ── identity_check ────────────────────────────────────────────
- assertVisible: "Create new identity"
- tapOn: "Create new identity"

# ── default_name ──────────────────────────────────────────────
- assertVisible: "What's your name?"
- inputText: ${NAME}
- hideKeyboard
- tapOn: "Continue"

# ── groups_setup: skip (fast-track) ──────────────────────────
- assertVisible: "Choose your groups"
- tapOn: "Skip"

# ── contact_info: skip (fast-track) ──────────────────────────
- assertVisible: "Add contact info"
- tapOn: "Skip"

# ── what_next: finish onboarding, go to main app ─────────────
- assertVisible: "What would you like to do?"
- tapOn: "Start using the app"

# Wait for identity generation and transition to main app
- waitForAnimationToEnd:
    timeout: 15000

# Post-state — at the very least, the onboarding flow must have
# advanced off the "What would you like to do?" screen.
- assertNotVisible: "What would you like to do?"
