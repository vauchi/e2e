# GitLab CI for vauchi-e2e
#
# End-to-end testing infrastructure
#
# Performance optimizations:
#   - Self-hosted runners: sccache, persistent caches, load-balanced
#   - Change-based rules: Jobs run only when relevant files change
#   - Timeouts: Prevent runaway jobs from blocking runners
#   - Read-only cache for lint jobs
#
# Note: Integration tests require relay and CLI binaries. The verify stage
# (triggered by core) compiles all targets but only executes unit tests.
# Full integration tests run via the manual test:smoke job.
#
# GitLab Ultimate Features:
#   - SAST: Static application security testing
#   - Secret Detection: Prevent credential leaks

# Shared templates + GitLab Ultimate Templates
include:
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/rust-base.yml'
      - '/ci-templates/security.yml'
      - '/ci-templates/mr-rules.yml'
      - '/ci-templates/downstream.yml'
      - '/ci-templates/reuse.yml'
      - '/ci-templates/test-quality.yml'
      - '/ci-templates/file-size.yml'
      - '/ci-templates/perf.yml'
      - '/ci-templates/badges.yml'
      - '/ci-templates/github-mirror.yml'
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - lint
  - test
  - security
  - verify
  - deploy


variables:
  # GitLab Ultimate Security Configuration
  SAST_EXCLUDED_PATHS: "target/, scenarios/"
  SECRET_DETECTION_EXCLUDED_PATHS: "target/, scenarios/"

# ============================================================
# Lint Stage — Preflight Gate (runs on Rust code changes)
# ============================================================

# Duplicate dependency check (advisory)
lint:duplicates:
  extends: [.rust-runner-nocache, .lint-duplicates-job, .timeout-quick]

# Unused dependency check (advisory)
lint:machete:
  extends: [.rust-runner-nocache, .lint-machete-job, .timeout-quick]

# Cheapest checks run first. Security jobs wait for these
# to pass before starting (PI-13 fail-fast DAG).

lint:format:
  extends: [.rust-runner-nocache, .lint-format, .validation-rust, .timeout-quick]

lint:clippy:
  extends: [.rust-runner-readonly, .lint-clippy, .validation-rust, .timeout-quick]

# ============================================================
# Security Stage (change-based, gated by lint)
# ============================================================

# Rust security audit (runs on dependency changes)
# Extends shared template for auto-install of cargo-audit
security:audit:
  extends: [.rust-runner-readonly, .security-audit-job]
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true

# Full cargo-deny check: advisories, licenses, bans, sources
# Extends shared template for auto-install of cargo-deny
security:deny:
  extends: [.rust-runner-readonly, .security-deny-job]
  stage: security
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true

# ============================================================
# Test Stage — Smoke Suite (PI-05)
# ============================================================
# Runs smoke tests (prefixed smoke_*) that cover 5 critical paths:
#   1. Identity creation + card field management
#   2. CLI exchange between two users
#   3. Card update → sync to contact
#   4. Backup + restore
#   5. Device linking
#
# Requires relay and CLI binaries (built on-demand with SHA cache).
# Runs automatically on MRs and main. Binary cache avoids rebuilds
# when relay/CLI haven't changed.
#
# Target: < 5 minutes total (< 1 min if binaries cached).

test:smoke:
  extends: [.rust-runner, .timeout-standard]
  stage: test
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  cache:
    key: smoke-binaries-${CI_DEFAULT_BRANCH}
    paths:
      - .smoke-bin/
    policy: pull-push
  script:
    - |
      mkdir -p .smoke-bin

      # Reuse cached binaries if relay/cli haven't changed on main
      RELAY_HEAD=$(git ls-remote --heads "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/vauchi/relay.git" main | cut -f1)
      CLI_HEAD=$(git ls-remote --heads "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/vauchi/cli.git" main | cut -f1)

      REBUILD_RELAY=1
      REBUILD_CLI=1
      [ -f .smoke-bin/relay.sha ] && [ "$(cat .smoke-bin/relay.sha)" = "$RELAY_HEAD" ] && [ -x .smoke-bin/vauchi-relay ] && REBUILD_RELAY=0
      [ -f .smoke-bin/cli.sha ] && [ "$(cat .smoke-bin/cli.sha)" = "$CLI_HEAD" ] && [ -x .smoke-bin/vauchi-cli ] && REBUILD_CLI=0

      TMPDIR=$(mktemp -d)

      if [ "$REBUILD_RELAY" -eq 1 ]; then
        echo "Building relay binary..."
        git clone --depth=1 --branch main \
          "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/vauchi/relay.git" "$TMPDIR/relay"
        cargo build --release --manifest-path "$TMPDIR/relay/Cargo.toml"
        cp "$TMPDIR/relay/target/release/vauchi-relay" .smoke-bin/
        echo "$RELAY_HEAD" > .smoke-bin/relay.sha
      else
        echo "Relay binary cached (${RELAY_HEAD:0:8})"
      fi

      if [ "$REBUILD_CLI" -eq 1 ]; then
        echo "Building CLI binary..."
        git clone --depth=1 --branch main \
          "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/vauchi/cli.git" "$TMPDIR/cli"
        cargo build --release --manifest-path "$TMPDIR/cli/Cargo.toml"
        cp "$TMPDIR/cli/target/release/vauchi-cli" .smoke-bin/
        echo "$CLI_HEAD" > .smoke-bin/cli.sha
      else
        echo "CLI binary cached (${CLI_HEAD:0:8})"
      fi

      export RELAY_BIN="$(pwd)/.smoke-bin/vauchi-relay"
      export CLI_BIN="$(pwd)/.smoke-bin/vauchi-cli"
      rm -rf "$TMPDIR"

      echo "Running smoke tests..."
      cargo nextest run --profile ci --run-ignored all -j 1 -- smoke_ 2>&1 | tee smoke-results.txt

      echo "Smoke suite complete"
  artifacts:
    when: always
    reports:
      junit: target/nextest/ci/junit.xml
    paths:
      - smoke-results.txt
    expire_in: 1 week
  timeout: 10 minutes

# GitLab security templates configuration
# Override child analyzer jobs (not parent stubs) to add tags and rules

semgrep-sast:
  tags: [docker]
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

secret_detection:
  tags: [docker]
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ============================================================
# Verify Stage — Upstream Compatibility
# ============================================================

# Runs when core merges to main and triggers this repo.
# Integration tests (tests/) need relay/CLI binaries that aren't available
# in downstream pipelines — build all targets to catch API breakage, but
# only execute unit tests from lib/bin targets.
verify:upstream-compat:
  extends: [.rust-runner, .verify-on-upstream, .verify-nextest-artifacts, .timeout-standard]
  stage: verify
  needs: []
  script:
    - cargo nextest run --profile ci --all-targets -E 'kind(lib) | kind(bin)'

# Runs when core creates a dev/RC tag and triggers this repo
verify:upstream-prerelease:
  extends: [.rust-runner, .verify-on-upstream-prerelease, .verify-nextest-artifacts, .timeout-standard]
  stage: verify
  needs: []
  script:
    - cargo nextest run --profile ci --all-targets -E 'kind(lib) | kind(bin)'

# ============================================================
# Deploy Stage — Badge Pages
# ============================================================

pages:
  extends: .badges-pages

github-mirror:
  extends: .github-mirror
