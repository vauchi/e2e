# GitLab CI for vauchi-e2e
#
# End-to-end testing infrastructure
#
# GitLab Ultimate Features:
#   - SAST: Static application security testing
#   - Secret Detection: Prevent credential leaks

# GitLab Ultimate Templates
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - lint
  - security

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  RUST_BACKTRACE: "1"

  # GitLab Ultimate Security Configuration
  SAST_EXCLUDED_PATHS: "target/, scenarios/"
  SECRET_DETECTION_EXCLUDED_PATHS: "target/, scenarios/"

.rust-cache: &rust-cache
  cache:
    key: ${CI_COMMIT_REF_SLUG}-rust
    paths:
      - .cargo/bin/
      - .cargo/registry/index/
      - .cargo/registry/cache/
      - .cargo/git/db/
      - target/

.rust-job:
  image: rust:latest
  <<: *rust-cache

# ============================================================
# Lint Stage
# ============================================================

lint:format:
  extends: .rust-job
  stage: lint
  script:
    - rustup component add rustfmt
    - cargo fmt --all -- --check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

lint:clippy:
  extends: .rust-job
  stage: lint
  script:
    - rustup component add clippy
    - cargo clippy --all-targets -- -D warnings
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  allow_failure: true  # May fail on git dependency issues

# ============================================================
# Security Stage
# ============================================================

# GitLab security templates configuration
# Override child analyzer jobs (not parent stubs) to add tags and rules

semgrep-sast:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

secret_detection:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# Note: E2E tests require relay and CLI binaries, so they run from the meta-repo
# See vauchi/vauchi CI for e2e:smoke and e2e:release jobs
