# GitLab CI for vauchi-e2e
#
# End-to-end testing infrastructure
#
# Performance optimizations:
#   - Self-hosted runners: sccache, persistent caches, load-balanced
#   - Change-based rules: Jobs run only when relevant files change
#   - Timeouts: Prevent runaway jobs from blocking runners
#   - Read-only cache for lint jobs
#
# Note: E2E tests require relay and CLI binaries, so actual test execution
# runs from the meta-repo (vauchi/vauchi). This pipeline only validates
# the test code itself (lint, security).
#
# GitLab Ultimate Features:
#   - SAST: Static application security testing
#   - Secret Detection: Prevent credential leaks

# Shared templates + GitLab Ultimate Templates
include:
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/rust-base.yml'
      - '/ci-templates/security.yml'
      - '/ci-templates/mr-rules.yml'
      - '/ci-templates/reuse.yml'
      - '/ci-templates/test-quality.yml'
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - lint
  - test
  - security


variables:
  # GitLab Ultimate Security Configuration
  SAST_EXCLUDED_PATHS: "target/, scenarios/"
  SECRET_DETECTION_EXCLUDED_PATHS: "target/, scenarios/"

# ============================================================
# Lint Stage — Preflight Gate (runs on Rust code changes)
# ============================================================
# Cheapest checks run first. Security jobs wait for these
# to pass before starting (PI-13 fail-fast DAG).

lint:format:
  extends: [.rust-runner-nocache, .validation-rust, .timeout-quick]
  stage: lint
  needs: []
  script:
    - cargo fmt --all -- --check

lint:clippy:
  extends: [.rust-runner-readonly, .validation-rust, .timeout-quick]
  stage: lint
  needs: []
  script:
    - cargo clippy --all-targets -- -D warnings

# ============================================================
# Security Stage (change-based, gated by lint)
# ============================================================

# Rust security audit (runs on dependency changes)
security:audit:
  extends: [.rust-runner-readonly, .validation-deps, .timeout-quick]
  stage: security
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  script:
    - cargo audit

# Full cargo-deny check: advisories, licenses, bans, sources
security:deny:
  extends: [.rust-runner-readonly, .timeout-quick]
  stage: security
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - cargo deny check

# ============================================================
# Test Stage — Smoke Suite (PI-05)
# ============================================================
# Runs smoke tests (prefixed smoke_*) that cover 5 critical paths:
#   1. Identity creation + card field management
#   2. CLI exchange between two users
#   3. Card update → sync to contact
#   4. Backup + restore
#   5. Device linking
#
# Requires relay and CLI binaries. Currently manual-only; will become
# automatic on merge to main once multi-project artifact pipeline
# is set up (needs relay:build and cli:build job artifacts).
#
# Target: < 5 minutes total.

test:smoke:
  extends: [.rust-runner, .timeout-standard]
  stage: test
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  allow_failure: true
  script:
    - |
      TMPDIR=$(mktemp -d)

      echo "Building relay binary..."
      git clone --depth=1 --branch main \
        "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/vauchi/relay.git" "$TMPDIR/relay"
      cargo build --release --manifest-path "$TMPDIR/relay/Cargo.toml"
      export RELAY_BIN="$TMPDIR/relay/target/release/vauchi-relay"

      echo "Building CLI binary..."
      git clone --depth=1 --branch main \
        "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/vauchi/cli.git" "$TMPDIR/cli"
      cargo build --release --manifest-path "$TMPDIR/cli/Cargo.toml"
      export CLI_BIN="$TMPDIR/cli/target/release/vauchi-cli"

      echo "Running smoke tests..."
      cargo nextest run --run-ignored all -j 1 -- smoke_ 2>&1 | tee smoke-results.txt

      echo "Smoke suite complete"
      rm -rf "$TMPDIR"
  artifacts:
    when: always
    paths:
      - smoke-results.txt
    expire_in: 1 week
  timeout: 10 minutes

# GitLab security templates configuration
# Override child analyzer jobs (not parent stubs) to add tags and rules

semgrep-sast:
  tags: [docker]
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

secret_detection:
  tags: [docker]
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
