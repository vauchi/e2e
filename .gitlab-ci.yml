# GitLab CI for vauchi-e2e
#
# End-to-end testing infrastructure
#
# Performance optimizations:
#   - Change-based rules: Jobs run only when relevant files change
#   - Timeouts: Prevent runaway jobs from blocking runners
#   - Read-only cache for lint jobs
#
# Note: E2E tests require relay and CLI binaries, so actual test execution
# runs from the meta-repo (vauchi/vauchi). This pipeline only validates
# the test code itself (lint, security).
#
# GitLab Ultimate Features:
#   - SAST: Static application security testing
#   - Secret Detection: Prevent credential leaks

# Shared templates + GitLab Ultimate Templates
include:
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/rust-base.yml'
      - '/ci-templates/security.yml'
      - '/ci-templates/mr-rules.yml'
      - '/ci-templates/reuse.yml'
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - lint
  - test      # Required by SAST template (no jobs in this stage)
  - security

variables:
  # GitLab Ultimate Security Configuration
  SAST_EXCLUDED_PATHS: "target/, scenarios/"
  SECRET_DETECTION_EXCLUDED_PATHS: "target/, scenarios/"

# ============================================================
# Lint Stage — Preflight Gate (runs on Rust code changes)
# ============================================================
# Cheapest checks run first. Security jobs wait for these
# to pass before starting (PI-13 fail-fast DAG).

lint:format:
  extends: [.rust-job, .validation-rust, .timeout-quick]
  stage: lint
  needs: []
  cache:
    policy: pull  # Read-only cache for lint
  script:
    - rustup component add rustfmt
    - cargo fmt --all -- --check

lint:clippy:
  extends: [.rust-job, .validation-rust, .timeout-quick]
  stage: lint
  needs: []
  cache:
    policy: pull  # Read-only cache for lint
  script:
    - rustup component add clippy
    - cargo clippy --all-targets -- -D warnings

# ============================================================
# Security Stage (change-based, gated by lint)
# ============================================================

# Rust security audit (runs on dependency changes)
security:audit:
  extends: [.rust-job, .validation-deps, .timeout-quick]
  stage: security
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  cache:
    policy: pull  # Read-only cache
  script:
    - cargo install cargo-audit || true
    - cargo audit

# Full cargo-deny check: advisories, licenses, bans, sources
security:deny:
  extends: [.rust-job, .timeout-quick]
  stage: security
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  cache:
    policy: pull
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - cargo binstall cargo-deny --no-confirm 2>/dev/null || cargo install cargo-deny || true
    - cargo deny check

# GitLab security templates configuration
# Override child analyzer jobs (not parent stubs) to add tags and rules

semgrep-sast:
  tags: [docker]
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "**/*.rs"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

secret_detection:
  tags: [docker]
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
