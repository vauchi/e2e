# GitLab CI for vauchi-e2e
#
# End-to-end testing infrastructure
#
# Performance optimizations:
#   - Self-hosted runners: sccache, persistent caches, load-balanced
#   - Change-based rules: Jobs run only when relevant files change
#   - Timeouts: Prevent runaway jobs from blocking runners
#   - Read-only cache for lint jobs
#
# Note: Integration tests require relay and CLI binaries. The verify stage
# (triggered by core) compiles all targets but only executes unit tests.
# Full integration tests run via the manual test:smoke job.
#
# GitLab Ultimate Features:
#   - SAST: Static application security testing
#   - Secret Detection: Prevent credential leaks

# Shared templates + GitLab Ultimate Templates
include:
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/rust-base.yml'
      - '/ci-templates/security.yml'
      - '/ci-templates/mr-rules.yml'
      - '/ci-templates/downstream.yml'
      - '/ci-templates/reuse.yml'
      - '/ci-templates/test-quality.yml'
      - '/ci-templates/file-size.yml'
      - '/ci-templates/perf.yml'
      - '/ci-templates/badges.yml'
      - '/ci-templates/freshness.yml'
      - '/ci-templates/github-mirror.yml'
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - lint
  - test
  - security
  - verify
  - deploy


variables:
  # GitLab Ultimate Security Configuration
  SAST_EXCLUDED_PATHS: "target/, scenarios/"
  SECRET_DETECTION_EXCLUDED_PATHS: "target/, scenarios/"

# ============================================================
# Lint Stage — Preflight Gate (runs on Rust code changes)
# ============================================================

# Blocks MRs with non-main branch refs in Cargo.toml git dependencies.
check:branch-refs:
  extends: .check-git-branch-refs

# Duplicate dependency check (advisory)
lint:duplicates:
  extends: [.rust-runner-nocache, .lint-duplicates-job, .timeout-quick]

# Unused dependency check (advisory)
lint:machete:
  extends: [.rust-runner-nocache, .lint-machete-job, .timeout-quick]

# Cheapest checks run first. Security jobs wait for these
# to pass before starting (PI-13 fail-fast DAG).

lint:format:
  extends: [.rust-runner-nocache, .lint-format, .validation-rust, .timeout-quick]

lint:clippy:
  extends: [.rust-runner-readonly, .lint-clippy, .validation-rust, .timeout-quick]

# ============================================================
# Security Stage (change-based, gated by lint)
# ============================================================

# Rust security audit (runs on dependency changes)
# Extends shared template for auto-install of cargo-audit
security:audit:
  extends: [.rust-runner-readonly, .security-audit-job]
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true

# Full cargo-deny check: advisories, licenses, bans, sources
# Extends shared template for auto-install of cargo-deny
security:deny:
  extends: [.rust-runner-readonly, .security-deny-job]
  stage: security
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true

# ============================================================
# Test Stage — Smoke Suite (PI-05)
# ============================================================
# Runs smoke tests (prefixed smoke_*) that cover 5 critical paths:
#   1. Identity creation + card field management
#   2. CLI exchange between two users
#   3. Card update → sync to contact
#   4. Backup + restore
#   5. Device linking
#
# Requires relay and CLI binaries (built on-demand with SHA cache).
# Runs automatically on MRs and main. Binary cache avoids rebuilds
# when relay/CLI haven't changed.
#
# Target: < 5 minutes total (< 1 min if binaries cached).

test:smoke:
  extends: [.rust-runner, .timeout-standard]
  stage: test
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  cache:
    key: smoke-binaries-${CI_DEFAULT_BRANCH}
    paths:
      - .smoke-bin/
    policy: pull-push
  script:
    - |
      mkdir -p .smoke-bin

      # Reuse cached binaries if relay/cli/core haven't changed on main.
      # Core is a shared dependency — both relay (vauchi-protocol) and CLI
      # (vauchi-core) pull it via git dep, so core changes must invalidate both.
      RELAY_HEAD=$(git ls-remote --heads "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/vauchi/relay.git" main | cut -f1)
      CLI_HEAD=$(git ls-remote --heads "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/vauchi/cli.git" main | cut -f1)
      CORE_HEAD=$(git ls-remote --heads "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/vauchi/core.git" main | cut -f1)

      CACHED_CORE=""
      [ -f .smoke-bin/core.sha ] && CACHED_CORE=$(cat .smoke-bin/core.sha)

      REBUILD_RELAY=1
      REBUILD_CLI=1
      [ -f .smoke-bin/relay.sha ] && [ "$(cat .smoke-bin/relay.sha)" = "$RELAY_HEAD" ] && [ "$CACHED_CORE" = "$CORE_HEAD" ] && [ -x .smoke-bin/vauchi-relay ] && REBUILD_RELAY=0
      [ -f .smoke-bin/cli.sha ] && [ "$(cat .smoke-bin/cli.sha)" = "$CLI_HEAD" ] && [ "$CACHED_CORE" = "$CORE_HEAD" ] && [ -x .smoke-bin/vauchi ] && REBUILD_CLI=0

      BUILD_TMPDIR=$(mktemp -d)

      if [ "$REBUILD_RELAY" -eq 1 ]; then
        echo "Building relay binary..."
        git clone --depth=1 --branch main \
          "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/vauchi/relay.git" "$BUILD_TMPDIR/relay"
        cargo build --release --manifest-path "$BUILD_TMPDIR/relay/Cargo.toml"
        cp "$BUILD_TMPDIR/relay/target/release/vauchi-relay" .smoke-bin/
        echo "$RELAY_HEAD" > .smoke-bin/relay.sha
      else
        echo "Relay binary cached (${RELAY_HEAD:0:8})"
      fi

      if [ "$REBUILD_CLI" -eq 1 ]; then
        echo "Building CLI binary..."
        git clone --depth=1 --branch main \
          "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/vauchi/cli.git" "$BUILD_TMPDIR/cli"
        cargo build --release --manifest-path "$BUILD_TMPDIR/cli/Cargo.toml"
        cp "$BUILD_TMPDIR/cli/target/release/vauchi" .smoke-bin/
        echo "$CLI_HEAD" > .smoke-bin/cli.sha
      else
        echo "CLI binary cached (${CLI_HEAD:0:8})"
      fi

      # Record core HEAD so future runs detect core-only changes
      echo "$CORE_HEAD" > .smoke-bin/core.sha

      export E2E_BIN_DIR="$(pwd)/.smoke-bin"
      rm -rf "$BUILD_TMPDIR"

      echo "Running smoke tests..."
      cargo nextest run --profile ci --run-ignored all -j 1 -- smoke_ 2>&1 | tee smoke-results.txt

      echo "Smoke suite complete"
  artifacts:
    when: always
    reports:
      junit: target/nextest/ci/junit.xml
    paths:
      - smoke-results.txt
    expire_in: 1 week
  timeout: 20 minutes

# Integration tests — full E2E suite on main and schedule.
# Pulls cached relay+CLI binaries from test:smoke.
# Advisory (allow_failure) until tests stabilize.
test:integration:
  extends: [.rust-runner, .timeout-long]
  stage: test
  needs:
    - job: test:smoke
      optional: true
  cache:
    key: smoke-binaries-${CI_DEFAULT_BRANCH}
    paths:
      - .smoke-bin/
    policy: pull
  script:
    - |
      export E2E_BIN_DIR="$(pwd)/.smoke-bin"
      if [ ! -x "$E2E_BIN_DIR/vauchi-relay" ] || [ ! -x "$E2E_BIN_DIR/vauchi" ]; then
        echo "ERROR: Cached binaries not found. test:smoke must run first."
        exit 1
      fi
      echo "Running integration tests..."
      cargo nextest run --profile ci --run-ignored all -- integration_ 2>&1 | tee integration-results.txt
      echo "Integration suite complete"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"
  allow_failure: true
  artifacts:
    when: always
    reports:
      junit: target/nextest/ci/junit.xml
    paths:
      - integration-results.txt
    expire_in: 1 week

# GitLab security templates configuration
# Override child analyzer jobs (not parent stubs) to add tags and rules

semgrep-sast:
  tags: [docker]
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

secret_detection:
  tags: [docker]
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ============================================================
# Verify Stage — Upstream Compatibility
# ============================================================

# Runs when core merges to main and triggers this repo.
# Integration tests (tests/) need relay/CLI binaries that aren't available
# in downstream pipelines — build all targets to catch API breakage, but
# only execute unit tests from lib/bin targets.
verify:upstream-compat:
  extends: [.rust-runner, .verify-on-upstream, .verify-nextest-artifacts, .timeout-standard]
  stage: verify
  needs: []
  script:
    - cargo nextest run --profile ci --all-targets -E 'kind(lib) | kind(bin)'

# Runs when core creates a dev/RC tag and triggers this repo
verify:upstream-prerelease:
  extends: [.rust-runner, .verify-on-upstream-prerelease, .verify-nextest-artifacts, .timeout-standard]
  stage: verify
  needs: []
  script:
    - cargo nextest run --profile ci --all-targets -E 'kind(lib) | kind(bin)'

# ============================================================
# Test Stage — Maestro Device Tests (manual, requires simulator)
# ============================================================
# Runs Maestro flows on iOS simulator. Manual trigger only.
# Requires: macOS runner with Maestro CLI + booted simulator.
# Gate: VAUCHI_DEVICE_TESTS=1 CI variable (set on runner or manually).

test:maestro-ios:
  stage: test
  tags: [macos, self-hosted]
  resource_group: ios-simulator
  rules:
    - if: $VAUCHI_DEVICE_TESTS == "1"
      when: manual
      allow_failure: true
  needs: []
  before_script:
    - |
      if ! command -v maestro &>/dev/null; then
        echo "Error: Maestro CLI not found on this runner."
        echo "Install: curl -Ls 'https://get.maestro.mobile.dev' | bash"
        exit 1
      fi
      echo "Maestro version: $(maestro --version 2>&1 | head -1)"
      BOOTED=$(xcrun simctl list devices booted 2>/dev/null | grep -c "Booted" || echo 0)
      echo "Booted simulators: $BOOTED"
      if [ "$BOOTED" -eq 0 ]; then
        echo "Error: No booted iOS simulator. Boot one before running."
        exit 1
      fi
  script:
    - |
      FAILED=0
      for flow in maestro/ios/*.yaml; do
        name=$(basename "$flow" .yaml)
        echo "→ $name"
        if maestro test "$flow" --platform ios; then
          echo "  ✓ $name"
        else
          echo "  ✗ FAILED: $name"
          FAILED=$((FAILED + 1))
        fi
      done
      echo ""
      if [ "$FAILED" -gt 0 ]; then
        echo "$FAILED flow(s) failed."
        exit 1
      fi
      echo "All iOS Maestro flows passed."
  timeout: 15 minutes

# ============================================================
# Deploy Stage — Badge Pages
# ============================================================

pages:
  extends: .badges-pages

github-mirror:
  extends: .github-mirror
